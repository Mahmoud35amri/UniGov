spring.application.name=unigov
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/unigov}

# JWT Configuration
unigov.app.jwtSecret=${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_LONG_RANDOM_KEY}
unigov.app.jwtExpirationMs=${JWT_EXPIRATION:86400000}

# CORS Configuration
unigov.app.allowedOrigins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Multipart Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads
server.port=${PORT:8081}

# Cloudinary Configuration (disabled — using local storage for now)
# cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:}
# cloudinary.api_key=${CLOUDINARY_API_KEY:}
# cloudinary.api_secret=${CLOUDINARY_API_SECRET:}

# Email Configuration (Brevo SMTP)
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.transport.protocol=smtp

# App URLs
unigov.app.frontendUrl=${FRONTEND_URL:http://localhost:5173}
unigov.app.fromEmail=${FROM_EMAIL:grissaabderrahmen@gmail.com}
